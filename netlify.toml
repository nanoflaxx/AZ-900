# Netlify configuration for AZ-900 Course

[build]
  # No build step needed — this is a static single-file site
  publish = "."
  command = ""

[context.production]
  # Production environment settings
  environment = { NODE_ENV = "production" }

[[redirects]]
  # Redirect all 404s to index.html for single-page app behavior
  from = "/*"
  to = "/az900_course.html"
  status = 200

[headers]
  # Cache static assets for 1 week
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=604800"

[[headers.values.netlify]]
  key = "X-Content-Type-Options"
  value = "nosniff"

[[headers.values.netlify]]
  key = "X-Frame-Options"
  value = "SAMEORIGIN"

[[headers.values.netlify]]
  key = "X-XSS-Protection"
  value = "1; mode=block"
